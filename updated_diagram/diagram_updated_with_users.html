<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ERD Graph</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
  :root {
    --bg: #0f1218;
    --bg-2: #161c26;
    --panel: rgba(18, 23, 32, 0.86);
    --panel-border: rgba(255,255,255,0.08);
    --grid: rgba(255,255,255,0.04);
    --module: #ff8a4c;
    --entity: #64b5f6;
    --field: #7bdcb5;
    --endpoint: #b084f9;
    --line: rgba(255,255,255,0.5);
    --text: #e9eef6;
    --muted: #a7b3c3;
  }

  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: "Space Grotesk", sans-serif;
  }

  .wrapper {
    overflow: auto;
    width: 100vw;
    height: 100vh;
    padding-top: 120px;
    box-sizing: border-box;
    background:
      radial-gradient(var(--grid) 1px, transparent 1px) 0 0 / 18px 18px,
      radial-gradient(var(--grid) 1px, transparent 1px) 9px 9px / 18px 18px,
      linear-gradient(120deg, var(--bg) 0%, #0b0e14 45%, var(--bg-2) 100%);
  }

  .board {
    position: relative;
    width: 4200px;
    height: 2000px;
  }

  .box {
    position: absolute;
    padding: 10px 16px;
    border-radius: 12px;
    color: #0b0e14;
    font-weight: 600;
    text-align: center;
    min-width: 170px;
    box-shadow: 0 10px 25px rgba(0,0,0,.35);
    line-height: 1.2;
    border: 1px solid rgba(255,255,255,0.2);
    backdrop-filter: blur(4px);
  }

  .module {
    background: linear-gradient(140deg, #ffcf8a 0%, var(--module) 60%, #f97316 100%);
    cursor: pointer;
    transition: transform .15s ease, box-shadow .15s ease;
  }
  .module:hover { transform: translateY(-2px); box-shadow: 0 14px 30px rgba(0,0,0,.4); }
  .module.active { outline: 2px solid #fff3; }
  .entity { background: linear-gradient(160deg, #b3dcff 0%, var(--entity) 70%); }
  .field { background: linear-gradient(160deg, #c7ffe1 0%, var(--field) 70%); font-size: 12px; }
  .endpoint {
    background: linear-gradient(160deg, #e6d0ff 0%, var(--endpoint) 70%);
    font-size: 12px;
    font-family: "IBM Plex Mono", monospace;
  }

  svg {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
  }

  path {
    stroke: var(--line);
    stroke-width: 2;
    fill: none;
    opacity: 0.85;
  }

  .ui {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    z-index: 20;
    padding: 16px 20px;
    background: linear-gradient(180deg, rgba(8,10,14,.9) 0%, rgba(8,10,14,.7) 100%);
    border-bottom: 1px solid var(--panel-border);
    backdrop-filter: blur(10px);
  }

  .topbar {
    display: flex;
    align-items: center;
    gap: 16px;
    justify-content: space-between;
  }

  .title {
    font-size: 20px;
    font-weight: 700;
    letter-spacing: .3px;
  }

  .subtitle {
    color: var(--muted);
    font-size: 13px;
    margin-top: 4px;
  }

  .actions {
    display: flex;
    gap: 10px;
    align-items: center;
  }

  .btn {
    border: 1px solid var(--panel-border);
    background: rgba(255,255,255,0.06);
    color: var(--text);
    padding: 8px 14px;
    border-radius: 10px;
    font-weight: 600;
    cursor: pointer;
    transition: background .15s ease, transform .15s ease;
  }
  .btn:hover { background: rgba(255,255,255,0.12); transform: translateY(-1px); }
  .btn.primary { background: #f97316; color: #0b0e14; border-color: transparent; }

  .module-rail {
    margin-top: 12px;
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding-bottom: 6px;
  }

  .chip {
    border: 1px solid var(--panel-border);
    background: rgba(255,255,255,0.05);
    color: var(--text);
    padding: 6px 12px;
    border-radius: 999px;
    font-size: 13px;
    cursor: pointer;
    white-space: nowrap;
    transition: background .15s ease, color .15s ease;
  }
  .chip.active { background: #f97316; color: #0b0e14; border-color: transparent; }
</style>
</head>

<body>
<div class="ui">

    <div>
      <div class="title">CANDID ERD Map</div>
      <div class="subtitle">Click a module to focus its diagram, or show all.</div>
    </div>
    <div class="actions">
      <button class="btn primary" id="showAllBtn">Show All Modules</button>
    </div>
  </div>
  <div class="module-rail" id="moduleList"></div>
</div>
<div class="wrapper">
  <div class="board" id="board">

let svg = document.getElementById("wires");
const moduleListEl = document.getElementById("moduleList");
const showAllBtn = document.getElementById("showAllBtn");

const columnX = { module: 80, entity: 520, field: 1080, endpoint: 1720 };
const spacing = { module: 120, field: 32, endpoint: 30 };
const padding = { top: 80, between: 80 };

let erd = embeddedErd;
let entityOrder = Object.keys(erd.entities);
const state = { activeModule: null };

function createBox(id, text, cls, x, y, opts = {}) {
  const el = document.createElement("div");
  el.className = `box ${cls}`;
  el.id = id;
  el.style.left = `${x}px`;
  el.style.top = `${y}px`;
  el.textContent = text;
  if (opts.onClick) el.addEventListener("click", opts.onClick);
  if (opts.active) el.classList.add("active");
  board.appendChild(el);
  return el;
}

function getPoint(el, side) {
  const r = el.getBoundingClientRect();
  const br = board.getBoundingClientRect();
  const xLeft = r.left - br.left;
  const yTop = r.top - br.top;
  const xRight = xLeft + r.width;
  const yMid = yTop + r.height / 2;
  return side === "right" ? { x: xRight, y: yMid } : { x: xLeft, y: yMid };
}

function connect(fromId, toId) {
  const from = document.getElementById(fromId);
  const to = document.getElementById(toId);
  if (!from || !to) return;
  const a = getPoint(from, "right");
  const b = getPoint(to, "left");
  const dx = Math.max(80, (b.x - a.x) * 0.5);
  const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
  path.setAttribute("d",
    `M ${a.x} ${a.y}
     C ${a.x + dx} ${a.y},
       ${b.x - dx} ${b.y},
       ${b.x} ${b.y}`
  );
  svg.appendChild(path);
}

const entityPositions = {};
const fieldPositions = {};
const modulePositions = {};
let entityLayout = [];
let moduleLayout = [];
const moduleEndpointMap = {
    "AuthModule": "auth",
"UniversityModule": "university",
  "UniAdminModule": "uni_admin",
  "TeacherModule": "teacher",
  "StudentModule": "student",
  "VacancyModule": "vacancy",
  "MessagingModule": "messages",
  "EmployerModule": "employer",
  "ProjectModule": "project",
  "SkillModule": "skill"
};

function getEndpointsForModule(mod) {
  const key = moduleEndpointMap[mod];
  if (key && erd.apiEndpoints && erd.apiEndpoints[key]) return erd.apiEndpoints[key];
  return [];
}

function getPrimaryEntityForModule(mod) {
  const mappedEntity = erd.moduleEntityMap ? erd.moduleEntityMap[mod] : null;
  const entityGuess = mod.replace("Module", "");
  return mappedEntity || (erd.entities[entityGuess] ? entityGuess : null);
}

function getVisibleModules() {
  if (!state.activeModule) return Object.keys(erd.modules);
  return [state.activeModule];
}

function getVisibleEntities() {
  if (!state.activeModule) return Object.keys(erd.entities);
  const primary = getPrimaryEntityForModule(state.activeModule);
  const visible = new Set();
  if (primary) {
    visible.add(primary);
    const rel = erd.relationships[primary];
    if (rel) {
      const targets = [];
      if (rel.has_many) targets.push(...rel.has_many);
      if (rel.belongs_to) targets.push(...(Array.isArray(rel.belongs_to) ? rel.belongs_to : [rel.belongs_to]));
      if (rel.many_to_many) targets.push(...rel.many_to_many);
      targets.forEach((t) => visible.add(t));
    }
  }
  return Array.from(visible);
}

function clearBoard() {
  board.innerHTML = '<svg id="wires"></svg>';
  svg = document.getElementById("wires");
}

function buildLayout() {
  entityLayout = [];
  let y = padding.top;
  for (const name of entityOrder) {
    const fieldCount = Object.keys(erd.entities[name]).length;
    const fieldsHeight = fieldCount * spacing.field;
    const blockHeight = Math.max(70, fieldsHeight);
    entityLayout.push({ name, y, fieldsHeight, blockHeight, fieldCount });
    y += blockHeight + padding.between;
  }
  const entityBottom = y + padding.top;

  moduleLayout = [];
  y = padding.top;
  const modules = getVisibleModules();
  modules.forEach((mod) => {
    const endpointCount = getEndpointsForModule(mod).length;
    const endpointHeight = endpointCount * spacing.endpoint;
    const blockHeight = Math.max(70, endpointHeight);
    moduleLayout.push({ mod, y, endpointCount, endpointHeight, blockHeight });
    y += blockHeight + padding.between;
  });
  const moduleBottom = y + padding.top;

  board.style.height = `${Math.max(2000, entityBottom, moduleBottom)}px`;
}

function renderEntities() {
  for (const item of entityLayout) {
    createBox(`entity-${item.name}`, item.name, "entity", columnX.entity, item.y);
    entityPositions[item.name] = item.y;
  }
}

function renderFields() {
  for (const item of entityLayout) {
    const fields = Object.entries(erd.entities[item.name]);
    let y = item.y - 6;
    fields.forEach(([field, type], idx) => {
      const id = `field-${item.name}-${idx}`;
      createBox(id, `${field}: ${type}`, "field", columnX.field, y);
      if (!fieldPositions[item.name]) fieldPositions[item.name] = [];
      fieldPositions[item.name].push(id);
      y += spacing.field;
    });
  }
}

function renderModules() {
  moduleLayout.forEach((item) => {
    const mod = item.mod;
    const modId = `module-${mod}`;
    createBox(
      modId,
      mod.replace("Module", " Module"),
      "module",
      columnX.module,
      item.y,
      {
        onClick: () => setActiveModule(mod),
        active: state.activeModule === mod
      }
    );
    modulePositions[mod] = item.y;
    const entityName = getPrimaryEntityForModule(mod);
    if (entityName && erd.entities[entityName]) connect(modId, `entity-${entityName}`);
  });
}

function renderEntityToFields() {
  for (const name of entityOrder) {
    const fieldIds = fieldPositions[name] || [];
    fieldIds.forEach((id) => connect(`entity-${name}`, id));
  }
}

function renderRelationships() {
  for (const [from, rel] of Object.entries(erd.relationships)) {
    if (!entityOrder.includes(from)) continue;
    const targets = [];
    if (rel.has_many) targets.push(...rel.has_many);
    if (rel.belongs_to) targets.push(...(Array.isArray(rel.belongs_to) ? rel.belongs_to : [rel.belongs_to]));
    if (rel.many_to_many) targets.push(...rel.many_to_many);

    targets.forEach((to) => {
      if (erd.entities[to] && entityOrder.includes(to)) {
        connect(`entity-${from}`, `entity-${to}`);
      }
    });
  }
}

function renderEndpoints() {
  moduleLayout.forEach((item) => {
    const mod = item.mod;
    const endpoints = getEndpointsForModule(mod);
    let y = item.y - 4;
    endpoints.forEach((ep, idx) => {
      const id = `endpoint-${mod}-${idx}`;
      const label = `${ep.method} ${ep.path}` || `/${base}`;
      createBox(id, label, "endpoint", columnX.endpoint, y);
      connect(`module-${mod}`, id);
      y += spacing.endpoint;
    });
  });
}

function renderAll() {
  clearBoard();
  entityOrder = getVisibleEntities();
  buildLayout();
  renderEntities();
  renderFields();
  renderModules();
  renderEndpoints();
  requestAnimationFrame(() => {
    renderEntityToFields();
    renderRelationships();
  });
}

function buildModuleList() {
  moduleListEl.innerHTML = "";
  const modules = Object.keys(erd.modules);
  modules.forEach((mod) => {
    const btn = document.createElement("button");
    btn.className = "chip";
    if (state.activeModule === mod) btn.classList.add("active");
    btn.textContent = mod.replace("Module", " Module");
    btn.addEventListener("click", () => setActiveModule(mod));
    moduleListEl.appendChild(btn);
  });
}

function setActiveModule(mod) {
  state.activeModule = mod;
  renderAll();
  buildModuleList();
  if (mod) {
    const wrapper = document.querySelector(".wrapper");
    const el = document.getElementById(`module-${mod}`);
    if (wrapper && el) {
      const br = board.getBoundingClientRect();
      const r = el.getBoundingClientRect();
      const top = r.top - br.top - 80;
      wrapper.scrollTop = Math.max(0, top);
      wrapper.scrollLeft = 0;
    }
  }
}

async function init() {
  try {
    const res = await fetch("erd_updated.json", { cache: "no-store" });
    if (res.ok) {
      const data = await res.json();
      if (data && data.entities && data.relationships && data.modules) {
        erd = data;
      }
    }
  } catch (err) {
    // Fallback to embedded JSON when file loading is blocked.
  }
  showAllBtn.addEventListener("click", () => setActiveModule(null));
  buildModuleList();
  renderAll();
}

init();
</script>
</body>
</html>
